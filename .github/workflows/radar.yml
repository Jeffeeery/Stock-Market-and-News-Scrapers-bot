name: Market Radar Bot

# 触发条件
on:
  schedule:
    - cron: '*/15 * * * *' # 保留原来的破闹钟作为备胎兜底
  workflow_dispatch:
  repository_dispatch: # 允许外部 Webhook 拿着暗号来敲门
    types: [precision-strike] # 我们定一个专属暗号

jobs:
  run-radar:
    runs-on: ubuntu-latest 
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        
      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安装必需的库
        run: |
          pip install requests feedparser google-genai yfinance
          
      - name: 运行主程序
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        # 注意：这里已经替换成了你实际上传的 Python 文件名
        run: python News-and-Stocks-Scrapers.py
